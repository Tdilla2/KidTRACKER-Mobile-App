name: Promote to Google Play Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "promote" to confirm production release'
        required: true

jobs:
  promote:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'promote'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install google-api-python-client
        run: pip install google-api-python-client google-auth

      - name: Promote internal testing to production
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          python3 << 'PYEOF'
          import json, os
          from google.oauth2 import service_account
          from googleapiclient.discovery import build

          credentials = service_account.Credentials.from_service_account_info(
              json.loads(os.environ["GOOGLE_PLAY_SERVICE_ACCOUNT_JSON"]),
              scopes=["https://www.googleapis.com/auth/androidpublisher"],
          )
          service = build("androidpublisher", "v3", credentials=credentials)
          package = "com.kidtrackerapp.mobile"

          # Create an edit
          edit = service.edits().insert(body={}, packageName=package).execute()
          edit_id = edit["id"]

          # Get the internal track
          track = service.edits().tracks().get(
              packageName=package, editId=edit_id, track="internal"
          ).execute()

          releases = track.get("releases", [])
          if not releases:
              print("No releases found on internal track")
              exit(1)

          latest = releases[0]
          version_codes = latest.get("versionCodes", [])
          print(f"Promoting version code(s) {version_codes} to production")

          # Promote to production using halted status first, then complete
          # This avoids the "no countries" error by using the app's existing targeting
          service.edits().tracks().update(
              packageName=package,
              editId=edit_id,
              track="production",
              body={
                  "track": "production",
                  "releases": [{
                      "versionCodes": version_codes,
                      "status": "completed",
                      "releaseNotes": [{"language": "en-US", "text": "Bug fixes and improvements."}],
                  }],
              },
          ).execute()

          # Commit the edit
          service.edits().commit(packageName=package, editId=edit_id).execute()
          print("Successfully promoted to production!")
          PYEOF
