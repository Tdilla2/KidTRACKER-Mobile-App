
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
      <title>KidTRACKERApp Mobile App</title>
      <script>
        if (typeof globalThis === "undefined") { window.globalThis = window; }
        window.onerror = function(msg, url, line, col, err) {
          var d = document.getElementById('debug-msg');
          if (d) d.innerHTML += '<br>ERROR: ' + msg + ' at ' + url + ':' + line;
          console.error('UNCAUGHT: ' + msg + ' at ' + url + ':' + line);
        };
        window.addEventListener('unhandledrejection', function(e) {
          var d = document.getElementById('debug-msg');
          if (d) d.innerHTML += '<br>PROMISE: ' + (e.reason && e.reason.message || e.reason);
          console.error('UNHANDLED_PROMISE: ' + (e.reason && e.reason.message || e.reason));
        });
      </script>
    </head>

    <body>
      <div id="root"></div>
      <div id="debug-msg" style="position:fixed;bottom:0;left:0;right:0;background:red;color:white;padding:8px;font-size:12px;z-index:99999;display:none;max-height:40vh;overflow:auto;"></div>
      <script>
        window.onerror = function(msg, url, line) {
          var d = document.getElementById('debug-msg');
          if (d) { d.style.display='block'; d.innerHTML += '<br>ERROR: ' + msg + ' at ' + url + ':' + line; }
        };
        window.addEventListener('unhandledrejection', function(e) {
          var d = document.getElementById('debug-msg');
          if (d) { d.style.display='block'; d.innerHTML += '<br>PROMISE: ' + (e.reason && e.reason.message || e.reason); }
        });
      </script>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
